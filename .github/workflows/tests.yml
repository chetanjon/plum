name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Run unit tests
        run: >
          xcodebuild test
          -project Plum.xcodeproj
          -scheme Plum
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGN_IDENTITY=""
