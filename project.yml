name: Chalant
options:
  bundleIdPrefix: com.cj
  deploymentTarget:
    macOS: "14.0"
packages:
  # Self-updates without an Apple Developer account: archives are
  # signed with our own EdDSA key (login keychain, generated by
  # Sparkle's generate_keys; SUPublicEDKey below is its public half).
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4
targets:
  Chalant:
    type: application
    platform: macOS
    sources:
      - Chalant
      # MediaRemote adapter (BSD 3-Clause, github.com/ungive/mediaremote-adapter):
      # perl loads the framework to stream any app's now-playing data.
      - path: Vendor/MediaRemoteAdapter/mediaremote-adapter.pl
        buildPhase: resources
      - path: Vendor/MediaRemoteAdapter/MediaRemoteAdapterTestClient
        buildPhase: resources
    dependencies:
      - framework: Vendor/MediaRemoteAdapter/MediaRemoteAdapter.framework
        embed: true
        codeSign: true
        link: false
      - package: Sparkle
    info:
      path: Chalant/Info.plist
      properties:
        # Version lives here: xcodegen regenerates Info.plist on every
        # run, so a version bumped only in the plist silently resets.
        CFBundleShortVersionString: 1.2.8
        CFBundleVersion: "107"
        # Sparkle: the feed rides the Pages site; checks stay OUR quiet
        # daily UpdateChecker (Sparkle's own scheduler off, no consent
        # dialog); Sparkle acts only when the user asks to install.
        SUFeedURL: https://chetanjon.github.io/chalant/appcast.xml
        SUPublicEDKey: HS35RsdFpfDTLuf/jX4Cnv7YLzzC72iXqlyPkbYfAzE=
        SUEnableAutomaticChecks: false
        LSUIElement: true
        NSHighResolutionCapable: true
        CFBundleIconFile: AppIcon
        CFBundleDisplayName: Chalant
        NSAppleEventsUsageDescription: Chalant controls your music players and sends the Messages you dictate, nothing more.
        NSContactsUsageDescription: Chalant looks up the person you name so a message reaches the right number.
        NSMicrophoneUsageDescription: Hold the notch to talk. Audio is processed on this Mac only.
        NSSpeechRecognitionUsageDescription: Turns your words into actions, on this Mac only.
        NSRemindersFullAccessUsageDescription: Chalant creates the reminders you set.
        NSCalendarsFullAccessUsageDescription: Chalant adds events and reads today's agenda.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cj.chalant
        CODE_SIGN_STYLE: Automatic
        # Stable dev-cert signing: ad-hoc re-signing made every rebuild
        # look like a new app, resetting Keychain and TCC grants.
        DEVELOPMENT_TEAM: WV59PZX4A3
        CODE_SIGN_IDENTITY: "Apple Development"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: NO
  ChalantTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ChalantTests
    dependencies:
      - target: Chalant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cj.chalant.tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WV59PZX4A3
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Chalant:
    build:
      targets:
        Chalant: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChalantTests
    archive:
      config: Release
